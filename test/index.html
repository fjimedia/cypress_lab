<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #962827;
        }

        .header h1 {
            font-size: 24px;
            color: #962827;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #962827;
            box-shadow: 0 0 5px rgba(150,40,39,0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #962827;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #7a201a;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #ffe0e0;
            color: #962827;
            display: block;
        }

        .message.success {
            background: #e0ffe0;
            color: #2d6a2d;
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Добавление материала</h1>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="username" placeholder="Введите логин" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Введите email" required>
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль" required>
            </div>
            
            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>
        
        <div id="message" class="message"></div>
        <div class="footer">
            <a href="#" style="color: #962827; text-decoration: none;">Войти</a> | 
            <a href="#" style="color: #962827; text-decoration: none;">Забыли пароль?</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            messageDiv.className = 'message';
            messageDiv.textContent = '';

            if (username.length < 3) {
                showMessage('Логин должен быть не менее 3 символов', true);
                return;
            }

            if (!email.includes('@')) {
                showMessage('Введите корректный email', true);
                return;
            }

            if (password.length < 6) {
                showMessage('Пароль должен быть не менее 6 символов', true);
                return;
            }

            showMessage('Регистрация успешна!', false);
            form.reset();
        });

        function showMessage(text, isError) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + (isError ? 'error' : 'success');
            
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }
    </script>
</body>
</html>
